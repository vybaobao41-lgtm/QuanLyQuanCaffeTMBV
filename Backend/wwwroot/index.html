<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Quản Lý Quán Cafe - Quản Lý Bàn</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/images/logo.png" type="image/png">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header" style="justify-content: space-between; display: flex; align-items: center;">
    <div style="display: flex; align-items: center;">
        <img src="/images/logo.png" class="header-logo" alt="Logo">
        <div>
            <h1>Quán Cafe <span>Quản Lý</span></h1>
            <div class="chu-nho">Hệ thống quản lý bàn, menu và thanh toán</div>
        </div>
    </div>
    <button onclick="dangXuat()" class="btn btn-do" style="padding: 8px 15px; margin-right: 20px;">🚪 Đăng Xuất</button>
</header>

<!-- ===== THANH ĐIỀU HƯỚNG ===== -->
<nav class="nav-tabs">
    <a id="tab-ban" href="/index.html" class="nav-tab active">
        🪑 Quản Lý Bàn
    </a>
    <a id="tab-menu" href="/menu.html" class="nav-tab">
        📋 Quản Lý Menu
    </a>
    <a id="tab-order" href="/order.html" class="nav-tab">
        🛎️ Gọi Món & Thanh Toán
    </a>
    <a id="tab-lichsu" href="/lichsu.html" class="nav-tab">
        📊 Lịch Sử Hóa Đơn
    </a>
</nav>

<!-- ===== NỘI DUNG CHÍNH ===== -->
<main class="main-content">
    <!-- ==================== TRANG QUẢN LÝ BÀN ==================== -->
    <section id="trang-ban" class="trang">
        <div class="luoi-2-cot">
            <!-- Sơ đồ bàn -->
            <div>
                <div class="card">
                    <div class="card-title">🗺️ Sơ Đồ Bàn</div>
                    <div id="luoi-ban" class="luoi-ban">
                        <div class="dang-tai">Đang tải...</div>
                    </div>
                    <div class="chu-nho mt-15">
                        💡 Nhấn vào bàn để chỉnh sửa hoặc xóa bàn đó.
                    </div>
                </div>
            </div>

            <!-- Quản lý bàn -->
            <div>
                <div class="card">
                    <div class="card-title">➕ Thêm Bàn Mới</div>
                    <div class="form-nhom">
                        <label class="form-nhan" for="txtTenBanMoi">Tên bàn</label>
                        <input id="txtTenBanMoi" type="text" class="form-nhap" 
                               placeholder="Ví dụ: Bàn 5, Bàn VIP 3">
                    </div>
                    <button id="btnThemBan" class="btn btn-chinh" onclick="themBanMoi()">➕ Thêm Bàn</button>
                    <div id="thong-bao-ban" class="thong-bao"></div>
                </div>

                <!-- Khu vực sửa/xóa bàn (hiện khi click vào bàn) -->
                <div id="khu-vuc-sua-ban" class="card" style="display:none">
                    <div class="card-title">✏️ Chỉnh Sửa Bàn</div>
                    <input id="txtSuaBanId" type="hidden">
                    <input id="txtXoaBanId" type="hidden">

                    <div class="form-nhom">
                        <label class="form-nhan">Tên bàn mới</label>
                        <input id="txtSuaTenBan" type="text" class="form-nhap">
                    </div>
                    <div id="thong-bao-xoa-ban" class="chu-nho mb-15"></div>
                    <div class="flex-hang">
                        <button id="btnLuuBan" class="btn btn-chinh" onclick="suaBan()">💾 Lưu</button>
                        <button id="btnXoaBan" class="btn btn-do" onclick="xoaBan()">🗑️ Xóa Bàn</button>
                        <button id="btnDongBan" class="btn btn-xam" onclick="document.getElementById('khu-vuc-sua-ban').style.display='none'">✕ Đóng</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script src="/js/ban.js"></script>
</body>
</html>
