<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Quản Lý Quán Cafe - Lịch Sử Hóa Đơn</title>
    <meta name="description" content="Phần mềm quản lý quán cafe: lịch sử hóa đơn.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header" style="justify-content: space-between; display: flex; align-items: center;">
    <div style="display: flex; align-items: center;">
        <img src="/images/logo.png" class="header-logo" alt="Logo">
        <div>
            <h1>Quán Cafe <span>Quản Lý</span></h1>
            <div class="chu-nho">Hệ thống quản lý bàn, menu và thanh toán</div>
        </div>
    </div>
    <button onclick="dangXuat()" class="btn btn-do" style="padding: 8px 15px; margin-right: 20px;">🚪 Đăng Xuất</button>
</header>

<!-- ===== THANH ĐIỀU HƯỚNG ===== -->
<nav class="nav-tabs">
    <a id="tab-ban" href="/index.html" class="nav-tab">
        🪑 Quản Lý Bàn
    </a>
    <a id="tab-menu" href="/menu.html" class="nav-tab">
        📋 Quản Lý Menu
    </a>
    <a id="tab-order" href="/order.html" class="nav-tab">
        🛎️ Gọi Món & Thanh Toán
    </a>
    <a id="tab-lichsu" href="/lichsu.html" class="nav-tab active">
        📊 Lịch Sử Hóa Đơn
    </a>
</nav>

<!-- ===== NỘI DUNG CHÍNH ===== -->
<main class="main-content">
    <!-- ==================== TRANG LỊCH SỬ ==================== -->
    <section id="trang-lichsu" class="trang">
        <div class="card">
            <div class="flex-hang mb-15">
                <div class="card-title" style="margin:0;border:none;padding:0">📊 Lịch Sử Hóa Đơn</div>
                <button class="btn btn-xam" onclick="taiLichSu()">🔄 Làm Mới</button>
            </div>
            <div style="overflow-x:auto">
                <table class="bang-du-lieu">
                    <thead>
                        <tr>
                            <th>Mã HĐ</th>
                            <th>Bàn</th>
                            <th>Giờ Mở</th>
                            <th>Giờ Thanh Toán</th>
                            <th>Tổng Tiền</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody id="bang-lich-su-body">
                        <tr><td colspan="6" class="dang-tai">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script src="/js/lichsu.js"></script>
</body>
</html>
