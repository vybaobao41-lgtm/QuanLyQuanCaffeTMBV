<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Quản Lý Quán Cafe - Quản Lý Menu</title>
    <meta name="description" content="Phần mềm quản lý quán cafe: quản lý thực đơn.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header" style="justify-content: space-between; display: flex; align-items: center;">
    <div style="display: flex; align-items: center;">
        <img src="/images/logo.png" class="header-logo" alt="Logo">
        <div>
            <h1>Quán Cafe <span>Quản Lý</span></h1>
            <div class="chu-nho">Hệ thống quản lý bàn, menu và thanh toán</div>
        </div>
    </div>
    <button onclick="dangXuat()" class="btn btn-do" style="padding: 8px 15px; margin-right: 20px;">🚪 Đăng Xuất</button>
</header>

<!-- ===== THANH ĐIỀU HƯỚNG ===== -->
<nav class="nav-tabs">
    <a id="tab-ban" href="/index.html" class="nav-tab">
        🪑 Quản Lý Bàn
    </a>
    <a id="tab-menu" href="/menu.html" class="nav-tab active">
        📋 Quản Lý Menu
    </a>
    <a id="tab-order" href="/order.html" class="nav-tab">
        🛎️ Gọi Món & Thanh Toán
    </a>
    <a id="tab-lichsu" href="/lichsu.html" class="nav-tab">
        📊 Lịch Sử Hóa Đơn
    </a>
</nav>

<!-- ===== NỘI DUNG CHÍNH ===== -->
<main class="main-content">
    <!-- ==================== TRANG QUẢN LÝ MENU ==================== -->
    <section id="trang-menu" class="trang">
        <div class="card">
            <div class="flex-hang mb-15">
                <div class="card-title" style="margin:0;border:none;padding:0">📋 Danh Sách Thực Đơn</div>
                <button class="btn btn-chinh" onclick="moModalThem()">➕ Thêm Món Mới</button>
            </div>
            <div id="thong-bao-menu" class="thong-bao"></div>
            <div style="overflow-x:auto">
                <table class="bang-du-lieu">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên Sản Phẩm</th>
                            <th>Loại</th>
                            <th>Giá</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="bang-menu-body">
                        <tr><td colspan="6" class="dang-tai">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<!-- ==================== MODAL THÊM SẢN PHẨM ==================== -->
<div id="modal-them-sp" class="modal-nen" onclick="this.id==='modal-them-sp'&&dongModal('modal-them-sp')">
    <div class="modal-hop" onclick="event.stopPropagation()">
        <div class="modal-title">➕ Thêm Sản Phẩm Mới</div>

        <form id="form-them-sp" onsubmit="event.preventDefault()">
            <div class="form-nhom">
                <label class="form-nhan" for="them-ten-sp">Tên sản phẩm <span style="color:red">*</span></label>
                <input id="them-ten-sp" type="text" class="form-nhap" placeholder="Ví dụ: Cà Phê Đá" required>
            </div>
            <div class="form-nhom">
                <label class="form-nhan" for="them-loai-sp">Loại <span style="color:red">*</span></label>
                <select id="them-loai-sp" class="form-chon" required>
                    <option value="ThucUong">🥤 Thức Uống</option>
                    <option value="DoAn">🍽️ Đồ Ăn</option>
                </select>
            </div>
            <div class="form-nhom">
                <label class="form-nhan" for="them-gia-sp">Giá (đồng) <span style="color:red">*</span></label>
                <input id="them-gia-sp" type="number" class="form-nhap" 
                       placeholder="Ví dụ: 35000" min="0" required>
            </div>
        </form>

        <div id="thong-bao-them-sp" class="thong-bao"></div>

        <div class="flex-hang-cuoi">
            <button class="btn btn-xam" onclick="dongModal('modal-them-sp')">✕ Hủy</button>
            <button class="btn btn-chinh" onclick="themSanPham()">💾 Lưu Sản Phẩm</button>
        </div>
    </div>
</div>

<!-- ==================== MODAL SỬA SẢN PHẨM ==================== -->
<div id="modal-sua-sp" class="modal-nen" onclick="this.id==='modal-sua-sp'&&dongModal('modal-sua-sp')">
    <div class="modal-hop" onclick="event.stopPropagation()">
        <div class="modal-title">✏️ Chỉnh Sửa Sản Phẩm</div>
        <input id="sua-sp-id" type="hidden">

        <div class="form-nhom">
            <label class="form-nhan" for="sua-ten-sp">Tên sản phẩm</label>
            <input id="sua-ten-sp" type="text" class="form-nhap">
        </div>
        <div class="form-nhom">
            <label class="form-nhan" for="sua-loai-sp">Loại</label>
            <select id="sua-loai-sp" class="form-chon">
                <option value="ThucUong">🥤 Thức Uống</option>
                <option value="DoAn">🍽️ Đồ Ăn</option>
            </select>
        </div>
        <div class="form-nhom">
            <label class="form-nhan" for="sua-gia-sp">Giá (đồng)</label>
            <input id="sua-gia-sp" type="number" class="form-nhap" min="0">
        </div>
        <div class="form-nhom">
            <label class="form-nhan" for="sua-dang-ban-sp">Trạng thái</label>
            <select id="sua-dang-ban-sp" class="form-chon">
                <option value="1">✅ Đang bán</option>
                <option value="0">🚫 Tạm ẩn</option>
            </select>
        </div>

        <div id="thong-bao-sua-sp" class="thong-bao"></div>

        <div class="flex-hang-cuoi">
            <button class="btn btn-xam" onclick="dongModal('modal-sua-sp')">✕ Hủy</button>
            <button class="btn btn-chinh" onclick="luuSuaSanPham()">💾 Lưu Thay Đổi</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/menu.js"></script>
</body>
</html>
