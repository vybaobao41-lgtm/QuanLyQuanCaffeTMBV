<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Mockup Giao Diện - Đăng Nhập</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--mau-toi) 0%, #1a1512 100%);
        }
        .login-box {
            background: var(--mau-nen-card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(200,135,58,0.1);
        }
        .login-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 50%;
            border: 2px solid var(--mau-cafe);
        }
        .login-title {
            color: var(--mau-cafe-sang);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .login-subtitle {
            color: var(--mau-xam);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="./images/logo.png" alt="Logo" class="login-logo">
    <h2 class="login-title">Đăng Nhập (Mockup)</h2>
    <p class="login-subtitle">Hệ Thống Quản Lý Quán Cafe</p>

    <form onsubmit="event.preventDefault(); alert('Đăng nhập thành công! (Mockup)'); window.location.href='./index.html';">
        <div class="form-nhom" style="text-align: left;">
            <label class="form-nhan">Tên đăng nhập</label>
            <input type="text" class="form-nhap" placeholder="Ví dụ: admin" required>
        </div>
        <div class="form-nhom" style="text-align: left;">
            <label class="form-nhan">Mật khẩu</label>
            <input type="password" class="form-nhap" placeholder="Nhập mật khẩu" required>
        </div>

        <button type="submit" class="btn btn-chinh" style="width: 100%; justify-content: center; padding: 12px; font-size: 1rem;">
            🔐 Đăng Nhập
        </button>
    </form>
</div>

</body>
</html>
